<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#fdf5d7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="剧本查阅" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <title>剧本查阅</title>
  <style>
    :root{
      --bg:#fdf5d7;--panel:#fffaf0;--card:#fffdf8;--hover:#fce8b5;--accent:#f5b70a;
      --primary:#013e75;--text:#1a1a1a;--secondary:#5b5b5b;--muted:#8a8a8a;
      --border:rgba(1,62,117,.12);--shadow:0 8px 24px rgba(1,62,117,.10);
      --nav-h:66px;--header-h:58px;--sidebar-w:190px;--reader-size:15px;
    }
    :root[data-theme="dark"]{
      --bg:#11161c;--panel:#181e26;--card:#1e252f;--hover:rgba(230,184,79,.12);--accent:#e6b84f;
      --primary:#84b8ff;--text:#eff4fb;--secondary:#c6d0dd;--muted:#90a0b4;
      --border:rgba(255,255,255,.10);--shadow:0 12px 32px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box} html,body{height:100%;margin:0;overflow:hidden}
    body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
    button,input,select{font:inherit;color:inherit} button{border:0;background:none;cursor:pointer}
    input,select{background:var(--card);border:1px solid var(--border);border-radius:12px;outline:none}
    input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 15%,transparent)}
    .app{height:100dvh;display:grid;grid-template-columns:1fr;grid-template-rows:var(--header-h) 1fr var(--nav-h)}
    .header{grid-row:1;display:flex;align-items:center;gap:10px;padding:env(safe-area-inset-top) 14px 0;border-bottom:1px solid var(--border);background:var(--panel);z-index:20}
    .project-button{min-width:0;flex:1;text-align:left;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .update-time{font-size:10px;color:var(--muted);white-space:nowrap}
    .icon-button{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px}
    .icon-button:active,.icon-button:hover{background:var(--hover)}
    .main{grid-row:2;min-height:0;overflow:hidden;position:relative}
    .bottom-nav{grid-row:3;display:grid;grid-template-columns:repeat(5,1fr);padding:4px 6px calc(4px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--border);z-index:30}
    .nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:12px;color:var(--secondary);font-size:11px;min-height:52px}
    .nav-btn .ico{font-size:20px;line-height:1}.nav-btn.active{background:var(--hover);color:var(--text);font-weight:700}
    .sidebar{display:none}
    .page{height:100%;min-height:0;overflow:hidden;display:flex;flex-direction:column}
    .toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);overflow-x:auto;flex:none}
    .toolbar::-webkit-scrollbar{display:none}.toolbar .meta{white-space:nowrap;flex:none}.toolbar input[type="search"]{height:40px;padding:0 13px;min-width:180px;flex:1}
    .select{height:38px;padding:0 30px 0 11px;white-space:nowrap}.small-btn,.primary-btn{height:38px;border-radius:11px;padding:0 13px;white-space:nowrap;border:1px solid var(--border);background:var(--card)}
    .primary-btn{background:#3d3d3d;color:var(--accent);border-color:#3d3d3d;font-weight:700}.small-btn.active{background:var(--hover);border-color:var(--accent)}
    .content-scroll{flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .empty{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted);padding:24px}.empty strong{display:block;color:var(--secondary);margin-bottom:8px}
    .result-row,.dialogue-row,.scene-row{width:100%;display:flex;align-items:center;gap:9px;height:38px;padding:0 12px;border-bottom:1px solid var(--border);text-align:left;background:transparent}
    .result-row:hover,.dialogue-row:hover,.scene-row:hover,.result-row.active{background:var(--hover)}
    .result-pos{width:46px;flex:none;color:var(--primary);font-weight:700;font-size:12px}.one-line{min-width:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}
    mark{background:var(--hover);border:1px solid var(--accent);border-radius:4px;padding:0 2px;color:var(--text)}
    .split{height:100%;display:grid;grid-template-columns:1fr;min-height:0}
    .pane{min-width:0;min-height:0;overflow:hidden;display:flex;flex-direction:column}.pane+.pane{border-left:1px solid var(--border)}
    .reader{height:100%;display:flex;flex-direction:column;background:var(--card)}
    .reader-head{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);flex:none}
    .reader-title{min-width:0;flex:1}.reader-title strong{display:block;font-size:14px}.reader-title span{display:block;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .reader-body{flex:1;overflow:auto;padding:18px 16px 100px;font-size:var(--reader-size);line-height:1.72;-webkit-overflow-scrolling:touch}
    .reader-inner{max-width:860px;margin:0 auto}.reader-body p{margin:0 0 8px;white-space:pre-wrap;word-break:break-word}.dialogue-name{font-weight:700}.action-line{display:block;padding-left:2em;text-indent:-1em}
    .reader-footer{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;gap:18px;height:52px;background:color-mix(in srgb,var(--panel) 94%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(12px)}
    .reader-footer button{height:36px;padding:0 14px;border-radius:10px;background:var(--card);border:1px solid var(--border)}
    .section-title{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);flex:none}
    .role-layout,.material-layout{height:100%;display:grid;grid-template-columns:1fr;min-height:0}
    .role-list,.material-list{min-height:0;overflow:auto}.role-row{width:100%;height:44px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);text-align:left}.role-row.active,.role-row:hover{background:var(--hover)}
    .role-name{font-weight:700}.meta{font-size:11px;color:var(--muted)}
    .dialogue-row{height:auto;min-height:46px;padding-top:7px;padding-bottom:7px;align-items:flex-start}.dialogue-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dialogue-source{font-size:10px;color:var(--muted);margin-bottom:2px}

    .scene-row{display:grid;grid-template-columns:42px 42px minmax(130px,1fr) 30px 30px;gap:7px;font-size:12px}.scene-place{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.scene-head{display:none}
    .material-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}.material-item:hover,.material-item.active{background:var(--hover)}.material-text{font-size:14px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.tag{display:inline-flex;margin-top:7px;padding:2px 8px;border-radius:999px;font-size:10px;background:var(--hover);color:var(--secondary)}
    .detail{height:100%;overflow:auto;padding:18px}.detail-card{max-width:760px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow)}.detail-text{font-size:17px;line-height:1.75;white-space:pre-wrap}.detail-meta{margin-top:18px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--secondary);line-height:1.9}.detail-actions{display:flex;gap:10px;margin-top:16px}
    .overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.32);display:flex;align-items:flex-end;justify-content:center}.sheet{width:100%;max-height:86dvh;background:var(--panel);border-radius:22px 22px 0 0;padding:12px 14px calc(16px + env(safe-area-inset-bottom));box-shadow:0 -18px 50px rgba(0,0,0,.2);overflow:auto}.sheet-title{display:flex;align-items:center;justify-content:space-between;height:42px;font-weight:700}.sheet-row{min-height:48px;width:100%;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);text-align:left}.sheet-row.active{color:var(--primary);font-weight:700}.settings-grid{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;min-height:50px;border-bottom:1px solid var(--border)}
    .toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:120;background:#333;color:#fff;border-radius:999px;padding:9px 16px;font-size:12px;box-shadow:var(--shadow);max-width:80vw;text-align:center}
    .brand{display:flex;align-items:center;gap:9px}.brand img{width:32px;height:32px;border-radius:9px;box-shadow:0 3px 12px rgba(1,62,117,.14)}
    .mindmap-page{position:relative}.mindmap-toolbar{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--panel);overflow-x:auto;flex:none}.mindmap-toolbar::-webkit-scrollbar{display:none}.mindmap-toolbar .small-btn{padding:0 11px}.mindmap-toolbar .meta{white-space:nowrap;flex:none}.mindmap-toolbar .zoom-label{min-width:58px;text-align:center;font-weight:700}
    .mindmap-viewport{position:relative;flex:1;min-height:0;overflow:hidden;touch-action:none;cursor:grab;background-image:radial-gradient(circle at 1px 1px,color-mix(in srgb,var(--primary) 11%,transparent) 1px,transparent 0);background-size:22px 22px;background-color:var(--card);user-select:none;-webkit-user-select:none}.mindmap-viewport.dragging{cursor:grabbing}.mindmap-canvas{position:absolute;left:0;top:0;padding:26px;min-width:max-content;will-change:transform;transform-origin:0 0}.mindmap-empty{padding:24px;color:var(--muted)}
    .tree-node-wrap{margin-bottom:10px}.tree-node-row{display:flex;align-items:center;gap:8px}.tree-node-button{display:flex;align-items:center;gap:8px;min-height:36px;max-width:310px;padding:7px 11px;border-radius:14px;border:1px solid transparent;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.13);text-align:left}.tree-node-button:active{transform:scale(.985)}.tree-arrow{width:13px;flex:none;opacity:.72}.tree-label{font-weight:700;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tree-count{min-width:23px;height:22px;padding:0 7px;border-radius:999px;display:grid;place-items:center;font-size:11px;font-weight:800;background:rgba(255,255,255,.24);border:1px solid rgba(255,255,255,.38)}.tree-children{margin:10px 0 0 28px;padding-left:15px;border-left:2px solid color-mix(in srgb,var(--primary) 18%,transparent)}
    .mindmap-hint{position:absolute;right:12px;bottom:12px;z-index:3;max-width:min(310px,72vw);padding:7px 10px;border-radius:11px;background:color-mix(in srgb,var(--panel) 92%,transparent);border:1px solid var(--border);box-shadow:var(--shadow);font-size:10px;color:var(--muted);pointer-events:none;backdrop-filter:blur(9px)}
    .desktop-only{display:none}.mobile-back{display:inline-grid}.hidden{display:none!important}
    @media(min-width:720px){
      .app{grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr}.header{grid-column:2;grid-row:1;padding-left:20px}.main{grid-column:2;grid-row:2}.bottom-nav{display:none}.sidebar{display:flex;grid-column:1;grid-row:1/3;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);padding:18px 12px 14px;z-index:30}.brand{font-weight:800;font-size:17px;padding:8px 9px 20px}.side-nav{display:flex;flex-direction:column;gap:6px}.side-nav .nav-btn{height:46px;min-height:46px;flex-direction:row;justify-content:flex-start;padding:0 13px;font-size:13px}.side-nav .ico{width:28px}.side-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:10px}.overlay{align-items:center}.sheet{max-width:430px;border-radius:20px;padding-bottom:18px}.toast{bottom:24px}.mobile-back{display:none}.desktop-only{display:inline-flex}
      .role-layout{grid-template-columns:220px 1fr}.role-list{border-right:1px solid var(--border)}
      .material-layout{grid-template-columns:minmax(320px,45%) 1fr}.material-list{border-right:1px solid var(--border)}
      .scene-row{grid-template-columns:58px 58px minmax(180px,1fr) 56px 56px;height:40px}.scene-head{display:grid;font-weight:700;background:var(--panel);position:sticky;top:0;z-index:2}
    }
    @media(min-width:1024px){
      :root{--sidebar-w:200px}.split{grid-template-columns:360px minmax(0,1fr)}.search-list-pane{display:flex!important}.search-reader-pane{display:flex!important}
      .toolbar{padding-left:16px;padding-right:16px}.reader-body{padding-left:28px;padding-right:28px}
    }
    @media(max-width:1023px){
      .search-reader-active .search-list-pane{display:none}.search-reader-active .search-reader-pane{display:flex}.search-reader-pane{display:none}
      .reader{position:relative}
    }
    @media(max-width:719px){
      .role-selected .role-list-pane,.material-selected .material-list-pane{display:none}.role-detail-pane,.material-detail-pane{display:none}.role-selected .role-detail-pane,.material-selected .material-detail-pane{display:flex}
      .toolbar{padding-top:8px;padding-bottom:8px}.toolbar input[type="search"]{min-width:160px}.scene-row{padding-left:9px;padding-right:9px;gap:4px}.detail{padding:12px}.detail-card{border-radius:14px;padding:15px;box-shadow:none}
    }
    .header-menu{flex:none}
    .scope-label{max-width:42vw;padding:6px 10px;border-radius:999px;background:var(--hover);color:var(--secondary);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none}
    .full-text{height:100%;overflow:auto;-webkit-overflow-scrolling:touch;background:var(--card);padding:18px 14px 96px}
    .full-text-inner{max-width:900px;margin:0 auto}
    .full-common,.full-episode{margin-bottom:26px}
    .full-doc-title,.full-episode-title{position:sticky;top:0;z-index:3;margin:0 -4px 12px;padding:10px 12px;border:1px solid var(--border);border-radius:13px;background:color-mix(in srgb,var(--panel) 94%,transparent);box-shadow:0 4px 14px rgba(1,62,117,.06);backdrop-filter:blur(10px);font-weight:800}
    .full-doc-title span,.full-episode-title span{display:block;margin-top:2px;font-size:10px;color:var(--muted);font-weight:500}
    .full-scene{padding:13px 2px 18px;border-bottom:1px solid var(--border)}
    .full-scene:last-child{border-bottom:0}
    .full-scene-head{margin-bottom:10px;padding:7px 10px;border-radius:10px;background:var(--hover);font-size:12px;font-weight:750;color:var(--secondary)}
    .full-scene-head small{display:block;margin-top:2px;color:var(--muted);font-size:10px;font-weight:500}
    .full-prose{font-size:var(--reader-size);line-height:1.72}
    .full-prose p{margin:0 0 8px;white-space:pre-wrap;word-break:break-word}
    .search-workspace{flex:1;min-height:0;overflow:hidden}
    .navigator-overlay{align-items:stretch!important;justify-content:flex-start!important}
    .navigator-drawer{width:min(88vw,370px);height:100%;max-height:none;background:var(--panel);border-radius:0 22px 22px 0;padding:calc(10px + env(safe-area-inset-top)) 10px calc(14px + env(safe-area-inset-bottom));box-shadow:18px 0 50px rgba(0,0,0,.22);overflow:hidden;display:flex;flex-direction:column}
    .navigator-head{height:50px;display:flex;align-items:center;gap:10px;padding:0 8px 8px;border-bottom:1px solid var(--border);flex:none}
    .navigator-head img{width:32px;height:32px;border-radius:9px}.navigator-head strong{min-width:0;flex:1;font-size:16px}.navigator-close{width:38px;height:38px;border-radius:11px;font-size:19px}.navigator-close:hover{background:var(--hover)}
    .navigator-tree{flex:1;min-height:0;overflow:auto;padding:9px 2px 30px;-webkit-overflow-scrolling:touch}
    .nav-project-card{margin-bottom:8px;border:1px solid var(--border);border-radius:15px;background:var(--card);overflow:hidden}
    .nav-tree-row{display:flex;align-items:center;gap:4px;min-height:44px;padding:3px 7px;border-bottom:1px solid color-mix(in srgb,var(--border) 75%,transparent)}
    .nav-tree-row:last-child{border-bottom:0}.nav-tree-row.selected{background:var(--hover);box-shadow:inset 3px 0 0 var(--accent)}
    .nav-disclosure{width:30px;height:34px;flex:none;border-radius:9px;color:var(--muted);font-size:15px}.nav-disclosure:hover{background:var(--hover)}
    .nav-select{min-width:0;flex:1;min-height:36px;padding:0 6px;text-align:left;display:flex;align-items:center;gap:7px;border-radius:9px}
    .nav-select:hover{background:color-mix(in srgb,var(--hover) 72%,transparent)}
    .nav-select-label{min-width:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.nav-select-meta{font-size:10px;color:var(--muted);white-space:nowrap}
    .nav-children{padding:3px 5px 6px 17px;background:color-mix(in srgb,var(--panel) 68%,transparent)}
    .nav-episode-block{border-left:1px solid var(--border);margin-left:6px;padding-left:5px}
    .nav-version-list{padding:0 4px 5px 34px}.nav-version-list .nav-tree-row{min-height:36px;border:0;padding:1px 3px}.nav-version-list .nav-select{min-height:32px}.nav-version-list .nav-select-label{font-size:11px;color:var(--secondary)}
    .nav-common-row{margin:3px 0 4px 6px;border-left:1px solid var(--border);padding-left:5px}
    @media(min-width:720px){.navigator-drawer{width:370px}.scope-label{max-width:50vw}}
    @media(max-width:719px){.header{gap:4px;padding-left:6px;padding-right:7px}.header-menu{width:40px}.settings-gear{width:40px}.project-button{font-size:13px}.update-time{display:none}.scope-label{max-width:34vw}.full-text{padding-left:12px;padding-right:12px}.toolbar input[type="search"]{min-width:0;width:100%}}
  </style>
</head>
<body>
<div id="app" class="app">
  <aside class="sidebar">
    <div class="brand"><img src="icons/icon-192.png" alt="" /> <span>剧本查阅</span></div>
    <div id="sideNav" class="side-nav"></div>
    <div class="side-bottom">
      <button id="sideUpdate" class="nav-btn"><span class="ico">↻</span><span>更新数据</span></button>
      <button id="sideSettings" class="nav-btn"><span class="ico">⚙</span><span>设置</span></button>
    </div>
  </aside>
  <header class="header">
    <button id="navigatorButton" class="icon-button header-menu" aria-label="打开项目导航">☰</button>
    <button id="projectButton" class="project-button">尚未导入数据</button>
    <span id="updateTime" class="update-time"></span>
    <button id="settingsButton" class="icon-button settings-gear" aria-label="设置">⚙</button>
  </header>
  <main id="main" class="main"></main>
  <nav id="bottomNav" class="bottom-nav"></nav>
  <input id="dataInput" type="file" accept=".json,application/json" hidden />
  <div id="overlayRoot"></div>
  <div id="toastRoot"></div>
</div>
<script>
'use strict';
const APP_VERSION='1.2.0';
const MODULES=[
  {key:'search',label:'搜索',icon:'⌕'},
  {key:'roles',label:'角色',icon:'人'},
  {key:'scenes',label:'场次',icon:'场'},
  {key:'mindmap',label:'导图',icon:'图'},
  {key:'materials',label:'素材',icon:'摘'}
];
const state={
  package:null,projects:[],projectId:'',module:'search',theme:localStorage.getItem('swm_theme')||'light',fontSize:Number(localStorage.getItem('swm_font')||15),
  navigation:{kind:'episode',episodeId:'',versionByEpisode:{},expandedProjects:{},expandedEpisodes:{}},
  search:{query:'',results:[],selectedIndex:-1,reader:null},
  roles:{query:'',selectedName:'',reader:null},
  scenes:{timeTag:'',inout:'',keyword:'',reader:null},
  mindmap:{scale:1,panX:18,panY:18,collapsed:{},needsFit:true},
  materials:{query:'',tag:'全部',versionFilter:'all',selectedId:'',reader:null},
  overlay:null,toastTimer:null
};
const $=s=>document.querySelector(s);
const renderTimers={};
function deferRender(key,delay=140){clearTimeout(renderTimers[key]);renderTimers[key]=setTimeout(()=>render(),delay)}
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const norm=v=>String(v??'').replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim();
const uid=(p='id')=>`${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
function fmtDate(v){if(!v)return'';const d=new Date(v);if(Number.isNaN(d.getTime()))return String(v);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function currentProject(){return state.projects.find(p=>p.id===state.projectId)||state.projects[0]||null}
function sortedEpisodes(p=currentProject()){return [...(p?.episodes||[])].sort((a,b)=>(Number(a.episodeNo)||0)-(Number(b.episodeNo)||0))}
function currentVersion(ep){const override=state.navigation?.versionByEpisode?.[ep?.id];return (ep?.versions||[]).find(v=>v.id===override)||(ep?.versions||[]).find(v=>v.id===ep.currentVersionId)||(ep?.versions||[])[0]||null}
function mergedEpisode(ep,version=currentVersion(ep)){if(!ep||!version)return null;return {...version,episodeId:ep.id,episodeNo:ep.episodeNo,episodeNoDisplay:ep.episodeNoDisplay??ep.episodeNo,currentVersionId:ep.currentVersionId,versions:ep.versions||[]}}
function currentEpisodes(){return sortedEpisodes().map(ep=>mergedEpisode(ep)).filter(Boolean)}
function findEpisode(id){return sortedEpisodes().find(ep=>ep.id===id)||null}
function findVersion(ep,id){return (ep?.versions||[]).find(v=>v.id===id)||currentVersion(ep)}
function findScene(episodeId,sceneKey,versionId){const ep=findEpisode(episodeId);const v=findVersion(ep,versionId);const scene=(v?.scenes||[]).find(s=>s.key===sceneKey);return ep&&v&&scene?{ep,version:v,scene,merged:mergedEpisode(ep,v)}:null}
function activeEpisodes(){const all=currentEpisodes();if(state.navigation.kind==='episode'&&state.navigation.episodeId)return all.filter(ep=>ep.episodeId===state.navigation.episodeId);if(state.navigation.kind==='common')return[];return all}
function getScenes(){return activeEpisodes().flatMap(ep=>(ep.scenes||[]).map(scene=>({...scene,episodeId:ep.episodeId,episodeNo:ep.episodeNo,episodeNoDisplay:ep.episodeNoDisplay,versionId:ep.id}))) }
function selectedRangeLabel(){const p=currentProject();if(!p)return'尚未导入数据';if(state.navigation.kind==='common')return p.commonDoc?.title||'公共文档';if(state.navigation.kind==='episode'){const ep=findEpisode(state.navigation.episodeId),v=currentVersion(ep);if(ep)return`第${ep.episodeNoDisplay??ep.episodeNo}集${v?.versionName?` · ${v.versionName}`:''}`}return'整个项目'}
function selectedHeaderLabel(){const p=currentProject();if(!p)return'尚未导入数据';const range=selectedRangeLabel();return range==='整个项目'?p.name:`${p.name} · ${range}`}
function sceneHierarchyParts(scene){const parts=Array.isArray(scene?.hierarchyParts)?scene.hierarchyParts.map(norm).filter(Boolean):[];if(parts.length)return parts;const label=norm(scene?.sceneLabel||'');const split=label.split(/\s*(?:[｜|>／/]|—|–)\s*/).map(norm).filter(Boolean);return split.length?split:[`第${scene?.episodeNoDisplay||''}集 第${scene?.sceneNoDisplay||''}场`]}
function mindMapScenes(){return getScenes()}
function buildMindMapTree(scenes){const root={name:'root',pathKey:'root',count:0,children:[],childrenMap:new Map()};for(const scene of scenes){let current=root;current.count+=1;for(const part of sceneHierarchyParts(scene)){const key=`${current.pathKey}>${part}`;if(!current.childrenMap.has(part)){const node={name:part,pathKey:key,count:0,children:[],childrenMap:new Map()};current.childrenMap.set(part,node);current.children.push(node)}current=current.childrenMap.get(part);current.count+=1}}const finalize=node=>{node.children=Array.from(node.childrenMap.values()).sort((a,b)=>a.name.localeCompare(b.name,'zh-CN'));node.children.forEach(finalize);delete node.childrenMap;return node};return finalize(root)}
function treeLevelColor(level){return ['#013e75','#2563a8','#f5b70a','#6f4aa8','#1f9d72'][Math.min(Math.max(level-1,0),4)]}
function renderMindMapNode(node,level=1){const collapsed=!!state.mindmap.collapsed[node.pathKey],hasChildren=!!node.children?.length,color=treeLevelColor(level),textColor=level===3?'#1a1a1a':'#fff',badgeStyle=level===3?'background:rgba(0,0,0,.12);border-color:rgba(0,0,0,.22);color:#1a1a1a':'';return `<div class="tree-node-wrap"><div class="tree-node-row"><button class="tree-node-button" data-tree-key="${esc(node.pathKey)}" style="background:${color};border-color:${color};color:${textColor}"><span class="tree-arrow">${hasChildren?(collapsed?'▸':'▾'):'·'}</span><span class="tree-label">${esc(node.name)}</span><span class="tree-count" style="${badgeStyle}">${node.count}</span></button></div>${!collapsed&&hasChildren?`<div class="tree-children">${node.children.map(child=>renderMindMapNode(child,Math.min(level+1,5))).join('')}</div>`:''}</div>`}
const mindMapGesture={mode:'',startX:0,startY:0,originX:0,originY:0,startDistance:0,startScale:1,worldX:0,worldY:0,moved:false,suppressClick:false};
function clampMindScale(value){return Math.max(.5,Math.min(1.8,Number(value)||1))}
function applyMindMapTransform(){const canvas=$('#mindMapCanvas'),label=$('#mindMapZoomLabel');if(canvas)canvas.style.transform=`translate(${state.mindmap.panX}px,${state.mindmap.panY}px) scale(${state.mindmap.scale})`;if(label)label.textContent=`${Math.round(state.mindmap.scale*100)}%`}
function setMindMapScale(next,clientX,clientY){const viewport=$('#mindMapViewport');if(!viewport)return;const old=state.mindmap.scale,nextScale=clampMindScale(next),rect=viewport.getBoundingClientRect(),px=Number.isFinite(clientX)?clientX-rect.left:rect.width/2,py=Number.isFinite(clientY)?clientY-rect.top:rect.height/2,worldX=(px-state.mindmap.panX)/old,worldY=(py-state.mindmap.panY)/old;state.mindmap.scale=nextScale;state.mindmap.panX=px-worldX*nextScale;state.mindmap.panY=py-worldY*nextScale;applyMindMapTransform()}
function resetMindMapView(){state.mindmap.scale=1;state.mindmap.panX=18;state.mindmap.panY=18;state.mindmap.needsFit=false;applyMindMapTransform()}
function fitMindMap(){const viewport=$('#mindMapViewport'),canvas=$('#mindMapCanvas');if(!viewport||!canvas)return;canvas.style.transform='none';const vw=viewport.clientWidth,vh=viewport.clientHeight,cw=Math.max(canvas.scrollWidth,1),ch=Math.max(canvas.scrollHeight,1),scale=clampMindScale(Math.min((vw-30)/cw,(vh-30)/ch,1));state.mindmap.scale=scale;state.mindmap.panX=Math.max(15,(vw-cw*scale)/2);state.mindmap.panY=Math.max(15,(vh-ch*scale)/2);state.mindmap.needsFit=false;applyMindMapTransform()}
function parseDialogue(text){const line=norm(text);if(!line)return null;const voiceCore='[vV]\\s*(?:[.．·])?\\s*[oO]\\s*(?:[.．·])?|[oO]\\s*(?:[.．·])?\\s*[sS]\\s*(?:[.．·])?';const voiceSuffix=`(?:\\s*(?:[（(]\\s*(?:${voiceCore})\\s*[）)]?|(?:${voiceCore})\\s*[）)]?))`;const re=new RegExp(`^([^\\s：:·•\\-—【】\\[\\]（）()]{1,20}?)(${voiceSuffix})?\\s*[：:]\\s*(.+)$`);const m=line.match(re);if(!m)return null;const character=norm(m[1]),display=norm(`${character}${m[2]||''}`),content=m[3];const em=content.match(/^[（(]([^）)]{1,10})[）)](.+)$/);return{character,display,emotion:em?em[1]:'',content:norm(em?em[2]:content)}}
function dialoguesForScene(scene){return (scene?.paragraphs||[]).map((p,i)=>{const d=parseDialogue(p.text);return d?{...d,paragraphIndex:i,paragraphId:p.id||''}:null}).filter(Boolean)}
function sceneLocation(label){return norm(label).replace(/\s*[｜|>]\s*/g,' / ').replace(/\s*\/\s*/g,' / ')}
function highlightHtml(text,query){const raw=String(text||'');if(!query)return esc(raw);const lower=raw.toLowerCase(),q=query.toLowerCase();let out='',pos=0,idx;while((idx=lower.indexOf(q,pos))!==-1){out+=esc(raw.slice(pos,idx))+`<mark>${esc(raw.slice(idx,idx+query.length))}</mark>`;pos=idx+Math.max(query.length,1)}return out+esc(raw.slice(pos))}
function snippet(text,query,index){const t=String(text||'').replace(/\s+/g,' '),r=15,start=Math.max(0,index-r),end=Math.min(t.length,index+query.length+r);return `${start?'…':''}${esc(t.slice(start,index))}<mark>${esc(t.slice(index,index+query.length))}</mark>${esc(t.slice(index+query.length,end))}${end<t.length?'…':''}`}
function buildSearchResults(){const p=currentProject(),q=norm(state.search.query);if(!p||!q)return[];const lower=q.toLowerCase(),results=[];const collect=(text,meta)=>{const t=String(text||'').replace(/\s+/g,' '),h=t.toLowerCase();let start=0,idx;while((idx=h.indexOf(lower,start))!==-1){results.push({...meta,id:uid('sr'),offset:idx,snippet:snippet(t,q,idx),text:t});start=idx+Math.max(lower.length,1)}};const includeCommon=state.navigation.kind==='common'||state.navigation.kind==='project';if(includeCommon&&p.commonDoc){(p.commonDoc.content||[]).forEach((block,index)=>collect(block.text,{type:'common',blockIndex:index,positionLabel:'文档',episodeNo:'文档',sceneNo:'',paragraphId:`common-${index}`}));if(state.navigation.kind==='common')return results}for(const ep of activeEpisodes()){for(const scene of ep.scenes||[]){const header=`第${ep.episodeNoDisplay}集 第${scene.sceneNoDisplay}场 ${scene.sceneLabel||''} ${scene.timeTag||''} ${scene.inout||''}`;collect(header,{episodeId:ep.episodeId,versionId:ep.id,sceneKey:scene.key,episodeNo:ep.episodeNoDisplay,sceneNo:scene.sceneNoDisplay,type:'header',paragraphId:''});for(const para of scene.paragraphs||[])collect(para.text,{episodeId:ep.episodeId,versionId:ep.id,sceneKey:scene.key,episodeNo:ep.episodeNoDisplay,sceneNo:scene.sceneNoDisplay,type:'paragraph',paragraphId:para.id||''})}}return results}
function roleData(){const map=new Map();for(const s of getScenes()){const seen=new Set();for(const d of dialoguesForScene(s)){if(!map.has(d.character))map.set(d.character,{name:d.character,sceneSet:new Set(),items:[],words:0});const row=map.get(d.character);row.items.push({...d,episodeId:s.episodeId,versionId:s.versionId,sceneKey:s.key,episodeNo:s.episodeNoDisplay,sceneNo:s.sceneNoDisplay,sceneLabel:s.sceneLabel});row.words+=d.content.length;if(!seen.has(d.character)){row.sceneSet.add(`${s.episodeId}_${s.key}`);seen.add(d.character)}}}return [...map.values()].map(x=>({...x,sceneCount:x.sceneSet.size,lineCount:x.items.length})).sort((a,b)=>b.sceneCount-a.sceneCount||b.lineCount-a.lineCount||a.name.localeCompare(b.name,'zh-CN'))}
function materialsData(){const rows=[],allowed=new Set(activeEpisodes().map(ep=>ep.episodeId));for(const ep of sortedEpisodes()){if(!allowed.has(ep.id))continue;const selected=currentVersion(ep);for(const v of ep.versions||[]){for(const m of v.materials||[])rows.push({...m,_id:m.id||uid('mat'),episodeId:ep.id,episodeNo:ep.episodeNoDisplay??ep.episodeNo,versionId:v.id,versionName:v.versionName||'未命名版本',isCurrent:v.id===selected?.id})}}return rows.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))}
function toast(msg){const root=$('#toastRoot');root.innerHTML=`<div class="toast">${esc(msg)}</div>`;clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>root.innerHTML='',2200)}
function openOverlay(type){state.overlay=type;renderOverlay()}
function closeOverlay(){state.overlay=null;renderOverlay()}
function applyTheme(){document.documentElement.dataset.theme=state.theme;document.documentElement.style.setProperty('--reader-size',`${state.fontSize}px`);document.querySelector('meta[name="theme-color"]').content=state.theme==='dark'?'#11161c':'#fdf5d7';localStorage.setItem('swm_theme',state.theme);localStorage.setItem('swm_font',String(state.fontSize))}
function updateHeader(){const p=currentProject();$('#projectButton').textContent=p?`${selectedHeaderLabel()}⌄`:'尚未导入数据';$('#updateTime').textContent=state.package?.exportedAt?`更新 ${fmtDate(state.package.exportedAt)}`:''}
function renderNav(){const html=MODULES.map(m=>`<button class="nav-btn ${state.module===m.key?'active':''}" data-nav="${m.key}"><span class="ico">${m.icon}</span><span>${m.label}</span></button>`).join('');$('#bottomNav').innerHTML=html;$('#sideNav').innerHTML=html}
function render(){applyTheme();updateHeader();renderNav();const main=$('#main');if(!currentProject()){main.innerHTML=renderNoData();bindCommon();return}if(state.module==='search')main.innerHTML=renderSearch();if(state.module==='roles')main.innerHTML=renderRoles();if(state.module==='scenes')main.innerHTML=renderScenes();if(state.module==='mindmap')main.innerHTML=renderMindMap();if(state.module==='materials')main.innerHTML=renderMaterials();bindCommon();bindModule();renderOverlay()}
function renderNoData(){return `<div class="empty"><div><strong>还没有移动端数据</strong><div>请先在电脑版点击“导出移动端数据”，再从这里导入 JSON 数据包。</div><button class="primary-btn" data-action="update" style="margin-top:18px">导入数据</button></div></div>`}
function episodeOptions(selected='',allLabel='全部集数'){return `<option value="">${allLabel}</option>`+sortedEpisodes().map(ep=>`<option value="${esc(ep.id)}" ${selected===ep.id?'selected':''}>第${esc(ep.episodeNoDisplay??ep.episodeNo)}集</option>`).join('')}
function renderScriptParagraph(para,highlight=''){const d=parseDialogue(para?.text);return d?`<p data-paragraph-id="${esc(para?.id||'')}"><span class="dialogue-name">${esc(d.display||d.character)}</span>：${d.emotion?`<span class="meta">（${esc(d.emotion)}）</span>`:''}${highlightHtml(d.content,highlight)}</p>`:`<p data-paragraph-id="${esc(para?.id||'')}"><span class="action-line">⊿${highlightHtml(norm(para?.text).replace(/^[△⊿]\s*/,''),highlight)}</span></p>`}
function renderCommonDocument(full=true,highlight='',targetIndex=-1){const doc=currentProject()?.commonDoc;if(!doc)return`<div class="empty"><div>当前项目没有公共文档</div></div>`;const blocks=(doc.content||[]).map((block,index)=>`<p data-common-index="${index}" id="common-${index}">${highlightHtml(block.text,highlight)}</p>`).join('');if(full)return`<section class="full-common"><div class="full-doc-title">📋 ${esc(doc.title||'公共文档')}<span>${(doc.content||[]).length}段</span></div><div class="full-prose">${blocks}</div></section>`;return`<article class="reader"><div class="reader-head"><button class="icon-button mobile-back" data-action="close-reader">‹</button><div class="reader-title"><strong>${esc(doc.title||'公共文档')}</strong><span>${esc(currentProject()?.name||'')}</span></div></div><div class="reader-body"><div class="reader-inner">${blocks}</div></div>${state.search.results.length?`<div class="reader-footer"><button data-action="prev-search">上一处</button><span class="meta">${state.search.selectedIndex+1}/${state.search.results.length}</span><button data-action="next-search">下一处</button></div>`:''}</article>`}
function renderFullText(){const p=currentProject();if(!p)return`<div class="empty"><div>暂无原文</div></div>`;if(state.navigation.kind==='common')return`<div class="full-text"><div class="full-text-inner">${renderCommonDocument(true)}</div></div>`;const common=state.navigation.kind==='project'&&p.commonDoc?renderCommonDocument(true):'';const episodes=activeEpisodes().map(ep=>{const scenes=(ep.scenes||[]).map(scene=>`<section class="full-scene" data-scene-key="${esc(scene.key)}"><div class="full-scene-head">第${esc(ep.episodeNoDisplay)}集 · 第${esc(scene.sceneNoDisplay)}场 · ${esc(sceneLocation(scene.sceneLabel))}<small>${esc(scene.timeTag||'—')} · ${esc(scene.inout||'—')}</small></div><div class="full-prose">${(scene.paragraphs||[]).map(para=>renderScriptParagraph(para)).join('')}</div></section>`).join('');return`<section class="full-episode"><div class="full-episode-title">第${esc(ep.episodeNoDisplay)}集<span>${esc(ep.versionName||'')} · ${(ep.scenes||[]).length}场</span></div>${scenes||`<div class="empty"><div>本集暂无原文</div></div>`}</section>`}).join('');return`<div class="full-text"><div class="full-text-inner">${common}${episodes||`<div class="empty"><div>当前范围暂无原文</div></div>`}</div></div>`}
function renderSearchWorkspace(){const q=norm(state.search.query);if(!q)return renderFullText();state.search.results=buildSearchResults();const reader=state.search.reader;const rows=state.search.results.map((r,i)=>`<button class="result-row ${state.search.selectedIndex===i?'active':''}" data-search-index="${i}"><span class="result-pos">${esc(r.positionLabel||`${r.episodeNo}-${r.sceneNo}`)}</span><span class="one-line">${r.snippet}</span></button>`).join('');return`<div class="split ${reader?'search-reader-active':''}"><div class="pane search-list-pane"><div class="section-title"><span>搜索结果</span><span>${state.search.results.length}处</span></div><div id="searchResults" class="content-scroll">${rows||`<div class="empty"><div>没有匹配内容</div></div>`}</div></div><div class="pane search-reader-pane">${reader?renderReader(reader,'search'):`<div class="empty"><div>点选结果查看原文</div></div>`}</div></div>`}
function renderSearch(){state.search.results=buildSearchResults();return`<section class="page"><div class="toolbar"><input id="searchInput" type="search" value="${esc(state.search.query)}" placeholder="搜索当前范围……" autocomplete="off" enterkeyhint="search"><span class="scope-label">${esc(selectedRangeLabel())}</span><span id="searchCount" class="meta">${state.search.query?`${state.search.results.length}处`:'原文'}</span></div><div id="searchWorkspace" class="search-workspace">${renderSearchWorkspace()}</div></section>`}
function readerPayload(loc,extra={}){const found=findScene(loc.episodeId,loc.sceneKey,loc.versionId);return found?{...loc,...found,...extra}:null}
function renderReader(payload,source){if(payload?.type==='common')return renderCommonDocument(false,payload.highlight||'',payload.blockIndex);const p=payload?.scene?payload:readerPayload(payload);if(!p)return`<div class="empty"><div>未找到对应原文</div></div>`;const q=payload.highlight||'';const paras=(p.scene.paragraphs||[]).map(para=>renderScriptParagraph(para,q)).join('');const footer=source==='search'&&state.search.results.length?`<div class="reader-footer"><button data-action="prev-search">上一处</button><span class="meta">${state.search.selectedIndex+1}/${state.search.results.length}</span><button data-action="next-search">下一处</button></div>`:'';return `<article class="reader"><div class="reader-head"><button class="icon-button mobile-back" data-action="close-reader">‹</button><div class="reader-title"><strong>第${esc(p.merged.episodeNoDisplay)}集 · 第${esc(p.scene.sceneNoDisplay)}场</strong><span>${esc(sceneLocation(p.scene.sceneLabel))}　${esc(p.scene.timeTag||'—')}　${esc(p.scene.inout||'—')}${p.version?.versionName?`　${esc(p.version.versionName)}`:''}</span></div></div><div class="reader-body"><div class="reader-inner">${paras}</div></div>${footer}</article>`}
function renderRoles(){const all=roleData(),data=all.filter(r=>!state.roles.query||r.name.includes(state.roles.query));if(!state.roles.selectedName&&all.length&&window.innerWidth>=720)state.roles.selectedName=all[0].name;const selected=all.find(r=>r.name===state.roles.selectedName);const roleRows=all.map(r=>`<button class="role-row ${r.name===state.roles.selectedName?'active':''}" data-role="${esc(r.name)}" ${state.roles.query&&!r.name.includes(state.roles.query)?'hidden':''}><span class="role-name">${esc(r.name)}</span><span class="meta">${r.sceneCount}场 · ${r.lineCount}条</span></button>`).join('');const dialogueRows=(selected?.items||[]).map((d,i)=>`<button class="dialogue-row" data-dialogue-index="${i}"><span class="result-pos">${esc(d.episodeNo)}-${esc(d.sceneNo)}</span><span class="one-line"><div class="dialogue-source">${esc(sceneLocation(d.sceneLabel))}</div><div class="dialogue-text"><b>${esc(d.display||d.character)}：</b>${esc(d.content)}</div></span></button>`).join('');return`<section class="page"><div class="toolbar"><span class="scope-label">${esc(selectedRangeLabel())}</span><input id="roleSearch" type="search" value="${esc(state.roles.query)}" placeholder="搜索角色名……"><span id="roleCount" class="meta">${data.length}人</span></div><div class="role-layout ${state.roles.selectedName?'role-selected':''}"><div class="pane role-list-pane"><div class="role-list">${roleRows||`<div class="empty"><div>暂无角色台词</div></div>`}</div></div><div class="pane role-detail-pane"><div class="section-title"><button class="mobile-back" data-action="back-role">‹ 角色</button><span>${selected?`${esc(selected.name)} · ${selected.sceneCount}场 · ${selected.lineCount}条`:''}</span></div><div class="content-scroll">${dialogueRows||`<div class="empty"><div>请选择角色</div></div>`}</div></div></div></section>`}
function filteredScenes(ignoreKeyword=false){const f=state.scenes;let rows=getScenes().filter(s=>(!f.timeTag||s.timeTag===f.timeTag)&&(!f.inout||s.inout===f.inout)&&(ignoreKeyword||!f.keyword||sceneLocation(s.sceneLabel).includes(f.keyword)));return rows.sort((a,b)=>(Number(a.episodeNo)||0)-(Number(b.episodeNo)||0)||(Number(a.sceneNo)||Number(a.sceneNoDisplay)||0)-(Number(b.sceneNo)||Number(b.sceneNoDisplay)||0))}

function resetProjectState(preferred='episode'){const first=sortedEpisodes()[0];state.navigation={kind:preferred==='episode'&&first?'episode':'project',episodeId:preferred==='episode'&&first?first.id:'',versionByEpisode:{},expandedProjects:{},expandedEpisodes:{}};if(state.projectId)state.navigation.expandedProjects[state.projectId]=true;if(first)state.navigation.expandedEpisodes[first.id]=true;state.search={query:'',results:[],selectedIndex:-1,reader:null};state.roles={query:'',selectedName:'',reader:null};state.scenes={timeTag:'',inout:'',keyword:'',reader:null};state.mindmap={scale:1,panX:18,panY:18,collapsed:{},needsFit:true};state.materials={query:'',tag:'全部',versionFilter:'all',selectedId:'',reader:null}}
const DB_NAME='ScriptWorkbenchMobile',STORE='data';
function openDb(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=()=>{if(!req.result.objectStoreNames.contains(STORE))req.result.createObjectStore(STORE)};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
async function dbGet(key){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).get(key);r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error)})}
async function dbSet(key,val){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(val,key);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})}
async function dbDelete(key){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(key);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})}
async function importPackage(file){try{const text=await file.text(),data=JSON.parse(text);if(!Array.isArray(data.projects))throw new Error('文件中没有 projects 数据');if(data.format&&data.format!=='script-workbench-mobile')throw new Error('不是移动端查阅数据包');const pkg={format:data.format||'script-workbench-mobile',schemaVersion:data.schemaVersion||1,exportedAt:data.exportedAt||new Date().toISOString(),sourceApp:data.sourceApp||'剧本管理工作台',projects:data.projects};await dbSet('package',pkg);state.package=pkg;state.projects=pkg.projects;state.projectId=state.projects[0]?.id||'';resetProjectState();toast(`已更新：${state.projects.length}个项目`);render()}catch(err){alert(`导入失败：${err.message}`)}}
$('#dataInput').onchange=async e=>{const f=e.target.files?.[0];if(f)await importPackage(f);e.target.value=''};
async function init(){applyTheme();try{const pkg=await dbGet('package');if(pkg?.projects){state.package=pkg;state.projects=pkg.projects;state.projectId=state.projects[0]?.id||'';resetProjectState('episode')}}catch(err){console.warn('读取本机数据失败',err)}render();if('serviceWorker'in navigator&&location.protocol.startsWith('http'))navigator.serviceWorker.register('./sw.js').catch(err=>console.warn('离线缓存注册失败',err))}
window.__SWM={state,render,resetProjectState,buildSearchResults,roleData,materialsData,buildMindMapTree,fitMindMap};
init();
</script>
